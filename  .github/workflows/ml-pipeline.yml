name: ML CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel previous run on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ml-model
  PYTHON_VERSION: "3.11"

# Least privilege permissions
permissions:
  contents: read
  id-token: write   # Required for OIDC
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Prevent infinite waits

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"  # Built-in cache from setup-python (faster than actions/cache)

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 src/ tests/ --max-line-length=120 --statistics

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Check import order with isort
        run: isort --check-only src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        # FIX: Type safety added, was missing in v1, critical in production

      - name: Security scan with bandit
        run: bandit -r src/ -ll
        # FIX: Security vulnerability scan, was missing in v1

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v
        # FIX: Added --cov-fail-under, minimum 70% coverage required

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-actions/py-coverage-comment@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_XML: coverage.xml

  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20

    outputs:
      image_uri: ${{ steps.set-outputs.outputs.image_uri }}
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # FIX: OIDC instead of access keys, no key rotation risk
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        # NOTE: GitHub OIDC provider must be added in the AWS console
        # Fallback: uncomment below to use access keys
        # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # FIX: Docker layer cache reduces build time by 50-70%
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # FIX: Build args embed metadata, version is queryable from inside the image
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}

      # FIX: Image security scan, catches CVEs before deploy
      - name: Scan image for vulnerabilities via Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Set outputs
        id: set-outputs
        run: |
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-aws:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    # FIX: Environment protection rules allow adding a manual approval gate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install deploy dependencies
        run: pip install sagemaker boto3

      - name: Deploy SageMaker Endpoint
        env:
          IMAGE_URI: ${{ needs.docker-build-push.outputs.image_uri }}
        run: |
          python scripts/deploy_sagemaker.py \
            --image-uri "$IMAGE_URI" \
            --role-arn "${{ secrets.SAGEMAKER_ROLE_ARN }}" \
            --endpoint-name ml-model-endpoint \
            --region "${{ env.AWS_REGION }}" \
            --wait
        # FIX: Added --wait, next stage does not start until deploy is complete

      # FIX: Smoke test verifies the endpoint is actually live
      - name: Smoke test endpoint
        run: |
          python scripts/smoke_test.py \
            --endpoint-name ml-model-endpoint \
            --region "${{ env.AWS_REGION }}"

  trigger-sagemaker-pipeline:
    name: Trigger SageMaker Pipeline
    runs-on: ubuntu-latest
    needs: deploy-aws
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install boto3 sagemaker

      - name: Trigger SageMaker ML Pipeline
        run: |
          python scripts/trigger_pipeline.py \
            --pipeline-name ml-training-pipeline \
            --region "${{ env.AWS_REGION }}" \
            --commit-sha "${{ github.sha }}" \
            --triggered-by "${{ github.actor }}"
        # FIX: Added --triggered-by, actor is written to lineage record

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build-push, deploy-aws, trigger-sagemaker-pipeline]
    if: always() && github.ref == 'refs/heads/main'
    # FIX: Slack notification on pipeline result, was missing in v1

    steps:
      - name: Notify Slack on success
        if: ${{ !contains(needs.*.result, 'failure') }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "ML Pipeline succeeded. commit: ${{ github.sha }} by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "ML Pipeline FAILED. commit: ${{ github.sha }} by ${{ github.actor }}. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
